<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scribble AI</title>
    <style>
        :root { --black: #000; --white: #fff; --muted: #666; --line: #ddd; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--white);
            color: var(--black);
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 560px;
            text-align: center;
        }
        h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
        }
        .subtitle {
            margin: 10px 0 20px 0;
            color: var(--muted);
            font-size: 0.95rem;
        }
        .canvas-container {
            position: relative;
            width: min(90vw, 480px);
            margin: 0 auto 18px auto;
            aspect-ratio: 1 / 1;
            border: 2px solid var(--black);
            background: var(--white);
            overflow: hidden;
            touch-action: none;
        }
        #sketchPad, #outputImage {
            width: 100%;
            height: 100%;
            display: block;
            background: var(--white);
        }
        #sketchPad {
            touch-action: none;
        }
        #outputImage {
            object-fit: cover;
            display: none;
        }
        .overlay {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.9);
            color: var(--black);
            gap: 12px;
            pointer-events: all;
        }
        .loader {
            width: 36px;
            height: 36px;
            border: 3px solid #bbb;
            border-top: 3px solid var(--black);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        .overlay-text {
            font-size: 0.9rem;
            color: var(--muted);
        }
        .artist-buttons {
            width: min(90vw, 480px);
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
        }
        .artist-btn, #resetBtn {
            padding: 12px 10px;
            border: 1px solid var(--black);
            background: var(--black);
            color: var(--white);
            font-size: 0.95rem;
            cursor: pointer;
        }
        .artist-btn:disabled, #resetBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        #resetBtn {
            width: min(90vw, 480px);
            margin-top: 8px;
            display: none;
        }
        #statusMsg {
            margin-top: 12px;
            min-height: 1.2em;
            color: #b00020;
            font-size: 0.9rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h1>Scribble AI</h1>
        <p class="subtitle">Verwandeln sie ihre Skizze in ein Kunstwerk</p>
        <div class="canvas-container">
            <canvas id="sketchPad"></canvas>
            <img id="outputImage" alt="Generiertes Kunstwerk">
            <div id="overlay" class="overlay">
                <div class="loader"></div>
                <div class="overlay-text">Kunstwerk wird generiert</div>
            </div>
        </div>
        <div id="artistButtons" class="artist-buttons"></div>
        <button id="resetBtn" type="button">Nochmal</button>
        <p id="statusMsg"></p>
    </div>

    <script>
        const container = document.querySelector('.canvas-container');
        const canvas = document.getElementById('sketchPad');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const outputImage = document.getElementById('outputImage');
        const artistButtons = document.getElementById('artistButtons');
        const resetBtn = document.getElementById('resetBtn');
        const statusMsg = document.getElementById('statusMsg');

        let drawing = false;
        let isGenerating = false;
        let isCompleted = false;
        let activePointerId = null;

        function resizeCanvas() {
            const size = container.clientWidth;
            canvas.width = size;
            canvas.height = size;
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#000';
        }

        function getPointerPosition(event) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: event.clientX - rect.left,
                y: event.clientY - rect.top
            };
        }

        function startDrawing(event) {
            if (isGenerating || isCompleted) return;
            event.preventDefault();
            activePointerId = event.pointerId;
            canvas.setPointerCapture(activePointerId);
            drawing = true;
            const pos = getPointerPosition(event);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(event) {
            if (event.pointerId !== activePointerId) return;
            if (!drawing || isGenerating || isCompleted) return;
            event.preventDefault();
            const pos = getPointerPosition(event);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function stopDrawing(event) {
            if (event && event.pointerId !== activePointerId) return;
            drawing = false;
            ctx.beginPath();
            if (activePointerId !== null && canvas.hasPointerCapture(activePointerId)) {
                canvas.releasePointerCapture(activePointerId);
            }
            activePointerId = null;
        }

        canvas.addEventListener('pointerdown', startDrawing);
        canvas.addEventListener('pointermove', draw);
        canvas.addEventListener('pointerup', stopDrawing);
        canvas.addEventListener('pointercancel', stopDrawing);

        window.addEventListener('resize', () => {
            if (!isCompleted) resizeCanvas();
        });

        resetBtn.addEventListener('click', () => {
            window.location.reload();
        });

        function setArtistButtonsDisabled(disabled) {
            const buttons = artistButtons.querySelectorAll('button');
            buttons.forEach((button) => {
                button.disabled = disabled;
            });
        }

        async function loadArtists() {
            try {
                const response = await fetch('/api/artists');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                const artists = Array.isArray(data.artists) ? data.artists.slice(0, 3) : [];
                if (artists.length === 0) {
                    throw new Error('Keine Künstler verfügbar.');
                }

                artistButtons.innerHTML = '';
                artists.forEach((artist) => {
                    const button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'artist-btn';
                    button.textContent = artist.name;
                    button.addEventListener('click', () => {
                        generateFromSketch(artist.name);
                    });
                    artistButtons.appendChild(button);
                });
            } catch (error) {
                statusMsg.textContent = `Fehler: ${error.message}`;
            }
        }

        async function generateFromSketch(artistName) {
            if (isGenerating) return;

            isGenerating = true;
            const sketchBase64 = canvas.toDataURL('image/png').split(',')[1];
            statusMsg.textContent = '';
            overlay.style.display = 'flex';
            setArtistButtonsDisabled(true);

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sketch: sketchBase64, artistName })
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data?.error || `HTTP ${response.status}`);
                }
                if (data.error) throw new Error(data.error);
                if (!data.imageBase64) throw new Error('Keine Bilddaten erhalten.');

                outputImage.src = `data:image/png;base64,${data.imageBase64}`;
                outputImage.style.display = 'block';
                canvas.style.display = 'none';
                isCompleted = true;
                artistButtons.style.display = 'none';
                resetBtn.style.display = 'block';
            } catch (error) {
                statusMsg.textContent = `Fehler: ${error.message}`;
                setArtistButtonsDisabled(false);
            } finally {
                isGenerating = false;
                overlay.style.display = 'none';
            }
        }

        resizeCanvas();
        loadArtists();
    </script>
</body>
</html>
