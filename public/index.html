<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scribble AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000;
            --white: #fff;
            --muted: #4a4a4a;
            --line: #111;
            --space-1: clamp(8px, 1.2vw, 12px);
            --space-2: clamp(12px, 1.8vw, 18px);
            --space-3: clamp(16px, 2.5vw, 28px);
            --space-4: clamp(24px, 4vw, 40px);
            --max-ui-width: min(92vw, 560px);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--white);
            color: var(--black);
            font-family: "Roboto", "Segoe UI", Arial, sans-serif;
            padding: var(--space-3);
        }
        .card {
            width: 100%;
            max-width: 640px;
            text-align: center;
            padding: var(--space-4) var(--space-2);
            border: 1px solid var(--black);
        }
        h1 {
            margin: 0;
            font-size: clamp(2.2rem, 7vw, 3.2rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1;
        }
        .subtitle {
            margin: var(--space-2) 0 var(--space-3) 0;
            color: var(--muted);
            font-size: clamp(1rem, 3vw, 1.15rem);
            line-height: 1.4;
            letter-spacing: 0.01em;
        }
        .status-banner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(86%, 360px);
            min-height: 120px;
            padding: 14px 16px;
            border: 1px solid var(--black);
            background: rgba(255, 255, 255, 0.86);
            color: var(--black);
            font-size: clamp(0.9rem, 2.4vw, 1rem);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
            line-height: 1.35;
            text-align: center;
            z-index: 6;
        }
        .status-banner-icon {
            width: 34px;
            height: 34px;
            border: 2px solid currentColor;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            flex-shrink: 0;
        }
        .status-banner-text {
            text-align: center;
        }
        .canvas-container {
            position: relative;
            width: min(100%, 500px);
            margin: 0 auto var(--space-2) auto;
            aspect-ratio: 1 / 1;
            border: 2px solid var(--black);
            background: var(--white);
            overflow: hidden;
            touch-action: none;
        }
        #sketchPad, #outputImage {
            width: 100%;
            height: 100%;
            display: block;
            background: var(--white);
        }
        #sketchPad {
            touch-action: none;
        }
        #outputImage {
            object-fit: cover;
            display: none;
        }
        .overlay {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.94);
            color: var(--black);
            gap: var(--space-1);
            pointer-events: all;
            padding: var(--space-2);
            z-index: 3;
        }
        .loader-seven-svg {
            width: clamp(76px, 20vw, 110px);
            height: clamp(76px, 20vw, 110px);
            display: block;
        }
        .overlay-text {
            font-size: clamp(0.95rem, 2.8vw, 1.08rem);
            color: var(--muted);
            letter-spacing: 0.01em;
        }
        .artist-buttons {
            width: min(100%, 500px);
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: var(--space-1);
        }
        .result-tabs {
            width: min(100%, 500px);
            margin: 0 auto 0 auto;
            display: none;
            border: 2px solid var(--black);
            border-bottom: none;
            background: var(--black);
            overflow: hidden;
        }
        .result-tab {
            flex: 1 1 0;
            min-height: clamp(38px, 6.4vw, 48px);
            padding: 8px 6px;
            border: none;
            border-right: 2px solid var(--black);
            background: var(--white);
            color: var(--black);
            font-size: clamp(0.86rem, 2.4vw, 1rem);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }
        .result-tab:last-child {
            border-right: none;
        }
        .result-tab.active {
            background: var(--black);
            color: var(--white);
        }
        .result-tab:disabled {
            cursor: not-allowed;
            opacity: 0.75;
        }
        .tab-loader {
            width: 12px;
            height: 12px;
            border: 2px solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            animation: tabSpin 0.8s linear infinite;
            flex-shrink: 0;
        }
        .tab-state {
            font-size: 0.95em;
            line-height: 1;
            flex-shrink: 0;
        }
        .artist-btn, #resetBtn {
            min-height: clamp(42px, 7vw, 52px);
            padding: 10px 8px;
            border: 2px solid var(--black);
            background: var(--black);
            color: var(--white);
            font-size: clamp(0.95rem, 2.8vw, 1.08rem);
            font-weight: 600;
            letter-spacing: 0.01em;
            cursor: pointer;
            transition: background 120ms ease, color 120ms ease;
        }
        .artist-btn:hover, #resetBtn:hover {
            background: var(--white);
            color: var(--black);
        }
        .artist-btn:disabled, #resetBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        #resetBtn {
            width: min(100%, 500px);
            margin: var(--space-1) auto 0 auto;
            display: none;
        }
        #statusMsg {
            margin-top: var(--space-2);
            min-height: 1.3em;
            color: #b00020;
            font-size: clamp(0.95rem, 2.6vw, 1.05rem);
            line-height: 1.35;
            display: none;
        }
        @media (max-width: 520px) {
            .card {
                border-left: none;
                border-right: none;
                padding-left: 0;
                padding-right: 0;
            }
            .artist-buttons {
                grid-template-columns: 1fr;
            }
            .result-tab {
                font-size: 0.95rem;
                min-height: 44px;
            }
        }
        @keyframes tabSpin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h1>Scribble AI</h1>
        <p class="subtitle">Verwandeln sie ihre Skizze in ein Kunstwerk</p>
        <div id="resultTabs" class="result-tabs"></div>
        <div class="canvas-container">
            <canvas id="sketchPad"></canvas>
            <img id="outputImage" alt="Generiertes Kunstwerk">
            <div id="statusBanner" class="status-banner" role="status" aria-live="polite">
                <span class="status-banner-icon">!</span>
                <span id="statusBannerText" class="status-banner-text"></span>
            </div>
            <div id="overlay" class="overlay">
                <svg class="loader-seven-svg" version="1.1" id="L7" xmlns="http://www.w3.org/2000/svg" x="0px" y="0px"
                    viewBox="0 0 100 100" xml:space="preserve" aria-hidden="true">
                    <path fill="#000" d="M31.6,3.5C5.9,13.6-6.6,42.7,3.5,68.4c10.1,25.7,39.2,38.3,64.9,28.1l-3.1-7.9c-21.3,8.4-45.4-2-53.8-23.3
                        c-8.4-21.3,2-45.4,23.3-53.8L31.6,3.5z">
                        <animateTransform
                            attributeName="transform"
                            attributeType="XML"
                            type="rotate"
                            dur="2s"
                            from="0 50 50"
                            to="360 50 50"
                            repeatCount="indefinite" />
                    </path>
                    <path fill="#000" d="M42.3,39.6c5.7-4.3,13.9-3.1,18.1,2.7c4.3,5.7,3.1,13.9-2.7,18.1l4.1,5.5c8.8-6.5,10.6-19,4.1-27.7
                        c-6.5-8.8-19-10.6-27.7-4.1L42.3,39.6z">
                        <animateTransform
                            attributeName="transform"
                            attributeType="XML"
                            type="rotate"
                            dur="1s"
                            from="0 50 50"
                            to="-360 50 50"
                            repeatCount="indefinite" />
                    </path>
                    <path fill="#000" d="M82,35.7C74.1,18,53.4,10.1,35.7,18S10.1,46.6,18,64.3l7.6-3.4c-6-13.5,0-29.3,13.5-35.3s29.3,0,35.3,13.5
                        L82,35.7z">
                        <animateTransform
                            attributeName="transform"
                            attributeType="XML"
                            type="rotate"
                            dur="2s"
                            from="0 50 50"
                            to="360 50 50"
                            repeatCount="indefinite" />
                    </path>
                </svg>
                <div class="overlay-text">Kunstwerk wird generiert</div>
            </div>
        </div>
        <div id="artistButtons" class="artist-buttons"></div>
        <button id="resetBtn" type="button">Nochmal</button>
        <p id="statusMsg"></p>
    </div>

    <script>
        const container = document.querySelector('.canvas-container');
        const canvas = document.getElementById('sketchPad');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const outputImage = document.getElementById('outputImage');
        const artistButtons = document.getElementById('artistButtons');
        const resultTabs = document.getElementById('resultTabs');
        const resetBtn = document.getElementById('resetBtn');
        const statusBanner = document.getElementById('statusBanner');
        const statusBannerText = document.getElementById('statusBannerText');
        const statusMsg = document.getElementById('statusMsg');

        let drawing = false;
        let isGenerating = false;
        let isCompleted = false;
        let hasSketch = false;
        let activePointerId = null;
        let artistsList = [];
        let selectedArtist = null;
        let artistResults = {};
        let firstGeminiErrorShown = false;

        function resizeCanvas() {
            const size = container.clientWidth;
            canvas.width = size;
            canvas.height = size;
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#000';
        }

        function getPointerPosition(event) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: event.clientX - rect.left,
                y: event.clientY - rect.top
            };
        }

        function startDrawing(event) {
            if (isGenerating || isCompleted) return;
            event.preventDefault();
            activePointerId = event.pointerId;
            canvas.setPointerCapture(activePointerId);
            drawing = true;
            const pos = getPointerPosition(event);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(event) {
            if (event.pointerId !== activePointerId) return;
            if (!drawing || isGenerating || isCompleted) return;
            event.preventDefault();
            const pos = getPointerPosition(event);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            if (!hasSketch) {
                hasSketch = true;
                setArtistButtonsDisabled(false);
            }
        }

        function stopDrawing(event) {
            if (event && event.pointerId !== activePointerId) return;
            drawing = false;
            ctx.beginPath();
            if (activePointerId !== null && canvas.hasPointerCapture(activePointerId)) {
                canvas.releasePointerCapture(activePointerId);
            }
            activePointerId = null;
        }

        canvas.addEventListener('pointerdown', startDrawing);
        canvas.addEventListener('pointermove', draw);
        canvas.addEventListener('pointerup', stopDrawing);
        canvas.addEventListener('pointercancel', stopDrawing);

        window.addEventListener('resize', () => {
            if (!isCompleted) resizeCanvas();
        });

        resetBtn.addEventListener('click', () => {
            window.location.reload();
        });

        function setArtistButtonsDisabled(disabled) {
            const buttons = artistButtons.querySelectorAll('button');
            buttons.forEach((button) => {
                button.disabled = disabled;
            });
        }

        function renderTabs() {
            if (!artistsList.length) return;
            resultTabs.innerHTML = '';

            artistsList.forEach((artist) => {
                const result = artistResults[artist.name] || { status: 'pending' };
                const tab = document.createElement('button');
                tab.type = 'button';
                tab.className = `result-tab${selectedArtist === artist.name ? ' active' : ''}`;
                tab.disabled = result.status === 'pending';
                tab.addEventListener('click', () => {
                    if (result.status !== 'success') return;
                    selectedArtist = artist.name;
                    renderSelectedImage();
                    renderTabs();
                });

                const label = document.createElement('span');
                label.textContent = artist.name;
                tab.appendChild(label);

                if (result.status === 'pending') {
                    const loader = document.createElement('span');
                    loader.className = 'tab-loader';
                    loader.setAttribute('aria-hidden', 'true');
                    tab.appendChild(loader);
                } else if (result.status === 'error') {
                    const fail = document.createElement('span');
                    fail.className = 'tab-state';
                    fail.textContent = '!';
                    tab.appendChild(fail);
                }

                resultTabs.appendChild(tab);
            });
        }

        function renderSelectedImage() {
            const selected = artistResults[selectedArtist];
            if (!selected || selected.status !== 'success') return;
            outputImage.src = `data:image/png;base64,${selected.imageBase64}`;
            outputImage.style.display = 'block';
            canvas.style.display = 'none';
            overlay.style.display = 'none';
            resultTabs.style.display = 'flex';
            resetBtn.style.display = 'block';
        }

        function mapUiErrorMessage(rawMessage) {
            const directMessage = String(rawMessage || '').trim();
            if (
                directMessage === 'Skizze entspricht nicht den Sicherheitsreichtlinien' ||
                directMessage === 'Skizze verletzt das Urheberrecht' ||
                directMessage === 'Maximale Generierungen erreicht, bitte kontaktieren sie uns' ||
                directMessage === 'Keine Bildgenerierung möglich'
            ) {
                return directMessage;
            }

            const message = String(rawMessage || '').toUpperCase();
            if (message.includes('UNPROCESSABLE_ENTITY') || message.includes('HTTP 422')) {
                return 'Skizze entspricht nicht den Sicherheitsreichtlinien';
            }
            if (message.includes('RECITATION')) {
                return 'Skizze verletzt das Urheberrecht';
            }
            if (message.includes('MAX_TOKENS')) {
                return 'Maximale Generierungen erreicht, bitte kontaktieren sie uns';
            }
            if (message.includes('SAFETY') || message.includes('BLOCKED')) {
                return 'Skizze entspricht nicht den Sicherheitsreichtlinien';
            }
            return 'Keine Bildgenerierung möglich';
        }

        function showStatusBanner(message) {
            statusBannerText.textContent = message;
            statusBanner.style.display = 'flex';
        }

        function hideStatusBanner() {
            statusBanner.style.display = 'none';
            statusBannerText.textContent = '';
        }

        function showFirstGeminiError(message) {
            if (firstGeminiErrorShown) return;
            firstGeminiErrorShown = true;
            showStatusBanner(message);
        }

        async function requestImageForArtist(artistName, sketchBase64, signal) {
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sketch: sketchBase64, artistName }),
                signal
            });

            const data = await response.json();
            if (!response.ok) {
                if (response.status === 422) {
                    throw new Error('Skizze entspricht nicht den Sicherheitsreichtlinien');
                }
                const message = data?.error || `HTTP ${response.status}`;
                const details = data?.details ? ` (${data.details})` : '';
                throw new Error(`${message}${details}`);
            }
            if (!data.imageBase64) {
                throw new Error('Keine Bilddaten erhalten.');
            }
            return data.imageBase64;
        }

        async function loadArtists() {
            try {
                const response = await fetch('/api/artists');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                const artists = Array.isArray(data.artists) ? data.artists.slice(0, 3) : [];
                if (artists.length === 0) {
                    throw new Error('Keine Künstler verfügbar.');
                }
                artistsList = artists;

                artistButtons.innerHTML = '';
                artists.forEach((artist) => {
                    const button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'artist-btn';
                    button.textContent = artist.name;
                    button.disabled = !hasSketch;
                    button.addEventListener('click', () => {
                        if (!hasSketch) return;
                        generateFromSketch(artist.name);
                    });
                    artistButtons.appendChild(button);
                });
            } catch (error) {
                statusMsg.textContent = `Fehler: ${error.message}`;
            }
        }

        async function generateFromSketch(artistName) {
            if (isGenerating) return;

            isGenerating = true;
            isCompleted = true;
            selectedArtist = artistName;
            artistResults = {};
            firstGeminiErrorShown = false;
            const sketchBase64 = canvas.toDataURL('image/png').split(',')[1];
            statusMsg.textContent = '';
            hideStatusBanner();
            overlay.style.display = 'flex';
            setArtistButtonsDisabled(true);
            artistButtons.style.display = 'none';
            resultTabs.style.display = 'none';

            artistsList.forEach((artist) => {
                artistResults[artist.name] = { status: 'pending' };
            });

            try {
                const generationController = new AbortController();
                let stopOnFirstError = false;

                const generationTasks = artistsList.map(async (artist) => {
                    try {
                        const imageBase64 = await requestImageForArtist(artist.name, sketchBase64, generationController.signal);
                        if (stopOnFirstError) return;
                        artistResults[artist.name] = { status: 'success', imageBase64 };
                        if (artist.name === selectedArtist) {
                            renderSelectedImage();
                        }
                    } catch (error) {
                        if (error?.name === 'AbortError') {
                            return;
                        }
                        if (stopOnFirstError) {
                            return;
                        }
                        stopOnFirstError = true;
                        generationController.abort();
                        artistResults[artist.name] = { status: 'error', error: error.message };
                        const mappedMessage = mapUiErrorMessage(error.message);
                        showFirstGeminiError(mappedMessage);
                        statusMsg.textContent = `Fehler: ${mappedMessage}`;
                        overlay.style.display = 'none';
                        resultTabs.style.display = 'none';
                        resetBtn.style.display = 'block';
                    } finally {
                        if (!stopOnFirstError) {
                            renderTabs();
                        }
                    }
                });

                await Promise.allSettled(generationTasks);

                if (stopOnFirstError) {
                    return;
                }

                const selectedResult = artistResults[selectedArtist];
                if (selectedResult?.status === 'success') {
                    renderSelectedImage();
                } else {
                    overlay.style.display = 'none';
                }

                const hasAnySuccess = Object.values(artistResults).some((entry) => entry.status === 'success');
                if (!hasAnySuccess) {
                    throw new Error('Keine Bildgenerierung möglich');
                }
            } catch (error) {
                const mappedMessage = mapUiErrorMessage(error.message);
                showStatusBanner(mappedMessage);
                statusMsg.textContent = `Fehler: ${mappedMessage}`;
            } finally {
                isGenerating = false;
            }
        }

        resizeCanvas();
        loadArtists();
    </script>
</body>
</html>
