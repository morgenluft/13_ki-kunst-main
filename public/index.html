<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 3 Sketch-to-Art</title>
    <style>
        :root { --primary: #4285f4; --bg: #f8f9fa; --text: #202124; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 550px; text-align: center; }
        
        /* Canvas Styling */
        #sketchPad { border: 2px solid #dfe1e5; border-radius: 12px; cursor: crosshair; background: #fff; touch-action: none; }
        .canvas-container { position: relative; margin-bottom: 1rem; }
        
        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 1rem; }
        input[type="text"] { flex: 1; padding: 12px; border: 2px solid #dfe1e5; border-radius: 10px; outline: none; }
        
        button { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-gen { background: var(--primary); color: white; width: 100%; }
        .btn-clear { background: #ea4335; color: white; }

        #resultContainer { margin-top: 20px; min-height: 150px; border: 2px dashed #eee; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        img { max-width: 100%; border-radius: 10px; display: none; margin-top: 10px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card">
        <h1>Scribble AI</h1>
        <p>Zeichne eine Skizze und lass die KI sie vollenden:</p>

        <div class="canvas-container">
            <canvas id="sketchPad" width="400" height="300"></canvas>
        </div>

        <div class="controls">
            <input type="text" id="promptInput" placeholder="Was soll daraus werden? (z.B. Ein Wald)">
            <button class="btn-clear" onclick="clearCanvas()">Löschen</button>
        </div>

        <button id="genBtn" class="btn-gen" onclick="generateFromSketch()">Skizze in Kunst verwandeln</button>

        <div id="resultContainer">
            <div id="loader" class="loader"></div>
            <p id="statusMsg">Deine Kunst erscheint hier...</p>
            <img id="outputImage" alt="Generierte KI Kunst">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('sketchPad');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        // Zeichen-Logik
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e.touches[0]); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); });
        canvas.addEventListener('touchend', stopDrawing);

        function startDrawing(e) { drawing = true; draw(e); }
        function stopDrawing() { drawing = false; ctx.beginPath(); }
        
        function draw(e) {
            if (!drawing) return;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#000';
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
        }

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        async function generateFromSketch() {
            const prompt = document.getElementById('promptInput').value || "Vervollständige diese Skizze zu einem detaillierten Kunstwerk.";
            const btn = document.getElementById('genBtn');
            const statusMsg = document.getElementById('statusMsg');
            const loader = document.getElementById('loader');
            const img = document.getElementById('outputImage');

            // Skizze als Base64 (PNG) extrahieren
            const sketchBase64 = canvas.toDataURL('image/png').split(',')[1];

            btn.disabled = true;
            loader.style.display = 'block';
            img.style.display = 'none';
            statusMsg.innerText = "KI interpretiert deine Skizze...";

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt, sketch: sketchBase64 })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error);

                if (data.imageBase64) {
                    img.src = `data:image/png;base64,${data.imageBase64}`;
                    img.style.display = 'block';
                    statusMsg.style.display = 'none';
                }
            } catch (error) {
                statusMsg.innerText = "Fehler: " + error.message;
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
