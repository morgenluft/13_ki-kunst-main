<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scribble AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000;
            --white: #fff;
            --muted: #4a4a4a;
            --line: #111;
            --space-1: clamp(8px, 1.2vw, 12px);
            --space-2: clamp(12px, 1.8vw, 18px);
            --space-3: clamp(16px, 2.5vw, 28px);
            --space-4: clamp(24px, 4vw, 40px);
            --max-ui-width: min(92vw, 560px);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--white);
            color: var(--black);
            font-family: "Roboto", "Segoe UI", Arial, sans-serif;
            padding: var(--space-3);
        }
        .card {
            width: 100%;
            max-width: 640px;
            text-align: center;
            padding: var(--space-4) var(--space-2);
            border: 1px solid var(--black);
        }
        h1 {
            margin: 0;
            font-size: clamp(2.2rem, 7vw, 3.2rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1;
        }
        .subtitle {
            margin: var(--space-2) 0 var(--space-3) 0;
            color: var(--muted);
            font-size: clamp(1rem, 3vw, 1.15rem);
            line-height: 1.4;
            letter-spacing: 0.01em;
        }
        .canvas-container {
            position: relative;
            width: min(100%, 500px);
            margin: 0 auto var(--space-2) auto;
            aspect-ratio: 1 / 1;
            border: 2px solid var(--black);
            background: var(--white);
            overflow: hidden;
            touch-action: none;
        }
        #sketchPad, #outputImage {
            width: 100%;
            height: 100%;
            display: block;
            background: var(--white);
        }
        #sketchPad {
            touch-action: none;
        }
        #outputImage {
            object-fit: cover;
            display: none;
        }
        .overlay {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.94);
            color: var(--black);
            gap: var(--space-1);
            pointer-events: all;
            padding: var(--space-2);
        }
        .loader-seven-svg {
            width: clamp(76px, 20vw, 110px);
            height: clamp(76px, 20vw, 110px);
            display: block;
        }
        .overlay-text {
            font-size: clamp(0.95rem, 2.8vw, 1.08rem);
            color: var(--muted);
            letter-spacing: 0.01em;
        }
        .artist-buttons {
            width: min(100%, 500px);
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: var(--space-1);
        }
        .artist-btn, #resetBtn {
            min-height: clamp(42px, 7vw, 52px);
            padding: 10px 8px;
            border: 2px solid var(--black);
            background: var(--black);
            color: var(--white);
            font-size: clamp(0.95rem, 2.8vw, 1.08rem);
            font-weight: 600;
            letter-spacing: 0.01em;
            cursor: pointer;
            transition: background 120ms ease, color 120ms ease;
        }
        .artist-btn:hover, #resetBtn:hover {
            background: var(--white);
            color: var(--black);
        }
        .artist-btn:disabled, #resetBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        #resetBtn {
            width: min(100%, 500px);
            margin-top: var(--space-1);
            display: none;
        }
        #statusMsg {
            margin-top: var(--space-2);
            min-height: 1.3em;
            color: #b00020;
            font-size: clamp(0.95rem, 2.6vw, 1.05rem);
            line-height: 1.35;
        }
        @media (max-width: 520px) {
            .card {
                border-left: none;
                border-right: none;
                padding-left: 0;
                padding-right: 0;
            }
            .artist-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Scribble AI</h1>
        <p class="subtitle">Verwandeln sie ihre Skizze in ein Kunstwerk</p>
        <div class="canvas-container">
            <canvas id="sketchPad"></canvas>
            <img id="outputImage" alt="Generiertes Kunstwerk">
            <div id="overlay" class="overlay">
                <svg class="loader-seven-svg" version="1.1" id="L7" xmlns="http://www.w3.org/2000/svg" x="0px" y="0px"
                    viewBox="0 0 100 100" xml:space="preserve" aria-hidden="true">
                    <path fill="#000" d="M31.6,3.5C5.9,13.6-6.6,42.7,3.5,68.4c10.1,25.7,39.2,38.3,64.9,28.1l-3.1-7.9c-21.3,8.4-45.4-2-53.8-23.3
                        c-8.4-21.3,2-45.4,23.3-53.8L31.6,3.5z">
                        <animateTransform
                            attributeName="transform"
                            attributeType="XML"
                            type="rotate"
                            dur="2s"
                            from="0 50 50"
                            to="360 50 50"
                            repeatCount="indefinite" />
                    </path>
                    <path fill="#000" d="M42.3,39.6c5.7-4.3,13.9-3.1,18.1,2.7c4.3,5.7,3.1,13.9-2.7,18.1l4.1,5.5c8.8-6.5,10.6-19,4.1-27.7
                        c-6.5-8.8-19-10.6-27.7-4.1L42.3,39.6z">
                        <animateTransform
                            attributeName="transform"
                            attributeType="XML"
                            type="rotate"
                            dur="1s"
                            from="0 50 50"
                            to="-360 50 50"
                            repeatCount="indefinite" />
                    </path>
                    <path fill="#000" d="M82,35.7C74.1,18,53.4,10.1,35.7,18S10.1,46.6,18,64.3l7.6-3.4c-6-13.5,0-29.3,13.5-35.3s29.3,0,35.3,13.5
                        L82,35.7z">
                        <animateTransform
                            attributeName="transform"
                            attributeType="XML"
                            type="rotate"
                            dur="2s"
                            from="0 50 50"
                            to="360 50 50"
                            repeatCount="indefinite" />
                    </path>
                </svg>
                <div class="overlay-text">Kunstwerk wird generiert</div>
            </div>
        </div>
        <div id="artistButtons" class="artist-buttons"></div>
        <button id="resetBtn" type="button">Nochmal</button>
        <p id="statusMsg"></p>
    </div>

    <script>
        const container = document.querySelector('.canvas-container');
        const canvas = document.getElementById('sketchPad');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const outputImage = document.getElementById('outputImage');
        const artistButtons = document.getElementById('artistButtons');
        const resetBtn = document.getElementById('resetBtn');
        const statusMsg = document.getElementById('statusMsg');

        let drawing = false;
        let isGenerating = false;
        let isCompleted = false;
        let activePointerId = null;

        function resizeCanvas() {
            const size = container.clientWidth;
            canvas.width = size;
            canvas.height = size;
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#000';
        }

        function getPointerPosition(event) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: event.clientX - rect.left,
                y: event.clientY - rect.top
            };
        }

        function startDrawing(event) {
            if (isGenerating || isCompleted) return;
            event.preventDefault();
            activePointerId = event.pointerId;
            canvas.setPointerCapture(activePointerId);
            drawing = true;
            const pos = getPointerPosition(event);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(event) {
            if (event.pointerId !== activePointerId) return;
            if (!drawing || isGenerating || isCompleted) return;
            event.preventDefault();
            const pos = getPointerPosition(event);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function stopDrawing(event) {
            if (event && event.pointerId !== activePointerId) return;
            drawing = false;
            ctx.beginPath();
            if (activePointerId !== null && canvas.hasPointerCapture(activePointerId)) {
                canvas.releasePointerCapture(activePointerId);
            }
            activePointerId = null;
        }

        canvas.addEventListener('pointerdown', startDrawing);
        canvas.addEventListener('pointermove', draw);
        canvas.addEventListener('pointerup', stopDrawing);
        canvas.addEventListener('pointercancel', stopDrawing);

        window.addEventListener('resize', () => {
            if (!isCompleted) resizeCanvas();
        });

        resetBtn.addEventListener('click', () => {
            window.location.reload();
        });

        function setArtistButtonsDisabled(disabled) {
            const buttons = artistButtons.querySelectorAll('button');
            buttons.forEach((button) => {
                button.disabled = disabled;
            });
        }

        async function loadArtists() {
            try {
                const response = await fetch('/api/artists');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                const artists = Array.isArray(data.artists) ? data.artists.slice(0, 3) : [];
                if (artists.length === 0) {
                    throw new Error('Keine Künstler verfügbar.');
                }

                artistButtons.innerHTML = '';
                artists.forEach((artist) => {
                    const button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'artist-btn';
                    button.textContent = artist.name;
                    button.addEventListener('click', () => {
                        generateFromSketch(artist.name);
                    });
                    artistButtons.appendChild(button);
                });
            } catch (error) {
                statusMsg.textContent = `Fehler: ${error.message}`;
            }
        }

        async function generateFromSketch(artistName) {
            if (isGenerating) return;

            isGenerating = true;
            const sketchBase64 = canvas.toDataURL('image/png').split(',')[1];
            statusMsg.textContent = '';
            overlay.style.display = 'flex';
            setArtistButtonsDisabled(true);

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sketch: sketchBase64, artistName })
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data?.error || `HTTP ${response.status}`);
                }
                if (data.error) throw new Error(data.error);
                if (!data.imageBase64) throw new Error('Keine Bilddaten erhalten.');

                outputImage.src = `data:image/png;base64,${data.imageBase64}`;
                outputImage.style.display = 'block';
                canvas.style.display = 'none';
                isCompleted = true;
                artistButtons.style.display = 'none';
                resetBtn.style.display = 'block';
            } catch (error) {
                statusMsg.textContent = `Fehler: ${error.message}`;
                setArtistButtonsDisabled(false);
            } finally {
                isGenerating = false;
                overlay.style.display = 'none';
            }
        }

        resizeCanvas();
        loadArtists();
    </script>
</body>
</html>
